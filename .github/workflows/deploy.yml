name: Clash Status CI/CD

on:
  pull_request:
    branches: ["main"]
    types: [closed]

concurrency:
  group: clash-status-deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Type Check
        run: |
          npm ci
          npm run check

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Image
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker buildx build \
            --platform linux/arm64 \
            -t ${{ secrets.STATUS_DOCKER_IMAGE }}:${IMAGE_TAG} \
            -t ${{ secrets.STATUS_DOCKER_IMAGE }}:latest \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            --push \
            .

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            set -eu
            cd /home/ubuntu/app

            touch .deploy.env

            sed -i "s|^STATUS_DOCKER_IMAGE=.*|STATUS_DOCKER_IMAGE=${{ secrets.STATUS_DOCKER_IMAGE }}|" .deploy.env || true
            grep -q "^STATUS_DOCKER_IMAGE=" .deploy.env || echo "STATUS_DOCKER_IMAGE=${{ secrets.STATUS_DOCKER_IMAGE }}" >> .deploy.env

            sed -i "s|^STATUS_IMAGE_TAG=.*|STATUS_IMAGE_TAG=${{ github.sha }}|" .deploy.env || true
            grep -q "^STATUS_IMAGE_TAG=" .deploy.env || echo "STATUS_IMAGE_TAG=${{ github.sha }}" >> .deploy.env

            export $(grep -v '^#' .deploy.env | xargs)

            docker compose pull clash-status
            docker compose up -d --no-deps clash-status
            docker image prune -f
